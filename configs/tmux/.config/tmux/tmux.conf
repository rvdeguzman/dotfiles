FG='#d7c483'
BG='#222222'
ACCENT1='#c9a554'
ACCENT2='#78834b'
COMMENT='#666666'
RED='#b36d43'
GREEN='#5f875f'

set -g default-terminal "tmux-256color"
set -g extended-keys on
set -g extended-keys-format csi-u
set -ag terminal-overrides ",xterm-256color:RGB"
set-hook -g session-created 'run-shell "tmux rename-session $(basename \"#{session_path}\")"'
set -g allow-passthrough on

unbind '"'
unbind %
unbind r
unbind [

bind y copy-mode

bind-key -T prefix w display-message "Split mode: (v=vertical, h=horizontal, d=delete pane)" \; switch-client -T split-mode
bind-key -T split-mode v split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind-key -T split-mode h split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T split-mode d kill-pane \; switch-client -T root

bind-key -T prefix r display-message "Rename mode: (s=session, w=window)" \; switch-client -T rename-mode
bind-key -T rename-mode s command-prompt -I "#S" "rename-session '%%'" \; switch-client -T root
bind-key -T rename-mode w command-prompt -I "#W" "rename-window '%%'" \; switch-client -T root

bind-key ` if-shell -F '#{==:#{session_name},popup}' 'detach-client' 'popup -d "#{pane_current_path}" -xC -yC -w80% -h80% -E "tmux attach -t popup || tmux new -s popup"'

unbind C-b
set-option -g prefix C-a
bind C-a send-prefix
set-option -g allow-rename off
setw -g clock-mode-colour $GREEN
set -g base-index 1 


COPY_COMMAND='pbcopy'
set -s copy-command "$COPY_COMMAND"
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "$COPY_COMMAND"
bind-key -T copy-mode-vi 'Y' send -X copy-pipe-and-cancel "$COPY_COMMAND"

# open windows in same directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# statusbar
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify centre
set -g status-style "fg=$FG,bg=default"
set-option -g status-style bg=default
set-option -g status-left-length 20
set-option -g status-left-style default
set-option -g status-left "#[fg=$COMMENT,bright]#(whoami)#[default]"
set-option -g status-right "#($HOME/.local/bin/tmux-agent-status --status-right 2>/dev/null) #[fg=$COMMENT]#S"
set-option -g status-right-length 140
set-option -g status-right-style "fg=$FG"
set-window-option -g window-status-style "fg=$COMMENT,bg=default"
set-window-option -g window-status-current-style "fg=$ACCENT1,bg=default"
set -as terminal-features ",*:RGB" 
set -g history-limit 50000
set -g display-time 2000

# Direct splits, matches herdr: v = left/right, h = top/bottom
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Resize mode: R enters, h/j/k/l resize until q/Esc/Enter exits (mirrors herdr prefix+shift+r)
bind R display-message "Resize mode: (h/j/k/l=resize, q=done)" \; switch-client -T resize-mode
bind -T resize-mode h resize-pane -L 5 \; switch-client -T resize-mode
bind -T resize-mode j resize-pane -D 2 \; switch-client -T resize-mode
bind -T resize-mode k resize-pane -U 2 \; switch-client -T resize-mode
bind -T resize-mode l resize-pane -R 5 \; switch-client -T resize-mode
bind -T resize-mode q switch-client -T root
bind -T resize-mode Escape switch-client -T root
bind -T resize-mode Enter switch-client -T root

bind Q confirm-before -p "Kill the *server*? (y/n)" "kill-server"
bind q confirm-before -p "Kill session #{session_name}? (y/n)" "kill-session"
bind X confirm-before -p "Kill window #I \"#W\"? (y/n)" kill-window
bind x kill-pane
bind C new-session
bind N switch-client -n
bind P switch-client -p
bind / choose-tree -Zs

set -g mouse on

bind a last-window
set -g renumber-windows on

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Optional agent-aware tmux QoL layer: sesh search, harpoon favorites, Bellmux attention queue.
source-file ~/.config/tmux/agent-lite.tmux

# tmux-agent-sidebar (hiroppy): rich live agent panel. C-a e toggle, C-a E all windows.
# Manually cloned (no TPM) to ~/.config/tmux/plugins/tmux-agent-sidebar.
set -g @sidebar_position right
set -g @sidebar_auto_create off
if "test -f ~/.config/tmux/plugins/tmux-agent-sidebar/tmux-agent-sidebar.tmux" \
  "run-shell ~/.config/tmux/plugins/tmux-agent-sidebar/tmux-agent-sidebar.tmux"
