onboarding = false

[theme]
name = "vesper"

auto_switch = false
[keys]
prefix = "ctrl+a"

settings = "prefix+g"
workspace_picker = "prefix+w"
goto = "prefix+s"

navigate_workspace_down = "j"
navigate_workspace_up = "k"

next_workspace = "prefix+j"
previous_workspace = "prefix+k"

# Vim-style pane focus — direct chords via vim-herdr-navigation plugin
# (see [[keys.command]] blocks at the bottom); plain focus binds cleared
# so they don't conflict with the plugin actions on the same chords.
navigate_pane_left = ""
navigate_pane_down = ""
navigate_pane_up = ""
navigate_pane_right = ""

focus_pane_left = ""
focus_pane_down = ""
focus_pane_up = ""
focus_pane_right = ""

# Splits — tmux split-mode: v = left/right, h = top/bottom, x = delete pane
# (herdr has no w-> submode; these are direct, w stays the workspace picker)
split_vertical = "prefix+v"
split_horizontal = "prefix+h"
close_pane = "prefix+x"

# Tabs ~ tmux windows
new_tab = "prefix+c"            # tmux: c new-window
next_tab = "prefix+n"
previous_tab = "prefix+p"
close_tab = "prefix+shift+x"    # tmux: X kill-window
rename_tab = "prefix+comma"         # tmux: r -> w rename-window

# Workspaces ~ tmux sessions
new_workspace = "prefix+shift+c"   # tmux: C new-session
close_workspace = "prefix+q" # tmux: q kill-session (confirm_close on)
rename_workspace = "prefix+colon" # tmux: r -> s rename-session
rename_pane = "prefix+semicolon"

# Session / pane control
detach = "prefix+d"                # tmux: d detach-client
zoom = "prefix+enter"                  # tmux: z zoom-pane
copy_mode = "prefix+y"             # tmux: [ enters copy-mode
resize_mode = "prefix+shift+r"     # moved off r (rename took it)
reload_config = "prefix+ctrl+r"

[ui.toast]
delivery = "herdr"

[ui]
show_agent_labels_on_pane_borders = true
prompt_new_tab_name = false

# vim-herdr-navigation: Ctrl+h/j/k/l across herdr panes and Vim splits.
# Requires the plugin (one-time, per machine):
#   herdr plugin install paulbkim-dev/vim-herdr-navigation --yes
# Editor side is vendored in home/dot_config/nvim/.../lua/config/keymaps.lua.
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"
